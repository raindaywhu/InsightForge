# Task 配置文件
# 每个Task定义: description, expected_output, agent

analyze_task:
  description: >
    针对"{topic}"主题进行深度分析研究。
    
    ## 执行步骤
    
    ### 1. 明确研究范围
    - 识别主题的核心问题
    - 确定分析的边界和重点
    - 列出关键研究问题
    
    ### 2. 检索分析框架
    - 从知识库中检索相关的分析框架
    - 选择最适合当前主题的框架组合
    - 理解框架的应用方法
    
    ### 3. 执行深度分析
    - 运用选择的分析框架
    - 进行系统性分析推理
    - 形成关键洞察和结论
    
    ### 4. 撰写技术报告
    - 遵循技术报告标准格式
    - 确保逻辑清晰、论证有力
    - 适当使用图表辅助说明
    
    ## 报告结构要求
    
    1. **标题和摘要**
       - 清晰的报告标题
       - 执行摘要（3-5个关键发现）
    
    2. **主体分析**
       - 分析框架说明
       - 详细分析过程
       - 关键数据和证据
    
    3. **结论和建议**
       - 核心结论总结
       - 可行性建议
    
    4. **附录**（如需要）
       - 参考资料
       - 术语表
    
    ## 质量标准
    
    - 论点有数据或案例支撑
    - 分析框架应用得当
    - 结论有逻辑推演
    - 语言专业准确
    
  expected_output: >
    一份完整的Markdown格式技术报告，包含：
    - 标题和执行摘要
    - 完整的分析过程
    - 清晰的结论和建议
    - 适当的图表说明（使用Markdown图表语法）
  agent: technical_analyst

design_task:
  description: >
    将技术报告转化为专业的PPT演示文稿结构。
    
    ## 执行步骤
    
    ### 1. 分析报告结构
    - 提取报告的主要章节
    - 识别每部分的核心观点
    - 确定信息的优先级
    
    ### 2. 设计信息架构
    - 设计PPT整体大纲
    - 确定每页的核心信息
    - 规划信息流动顺序
    
    ### 3. 检索设计原则
    - 从知识库中检索PPT设计最佳实践
    - 应用配色和排版原则
    - 选择合适的图表类型
    
    ### 4. 创建幻灯片结构
    - 设计每页的具体内容
    - 提供图表和视觉建议
    - 确保信息层次清晰
    
    ## PPT设计原则
    
    - **简洁**：每页不超过3-5个要点
    - **聚焦**：突出核心信息
    - **视觉**：善用图表替代文字
    - **一致**：统一的风格和配色
    
    ## 输出格式
    
    输出JSON结构的PPT设计文档，包含：
    - 元数据（标题、作者、日期）
    - 幻灯片数组（类型、标题、内容、图表建议）
    
  expected_output: >
    一份详细的PPT结构描述，JSON格式，包含：
    {
      "metadata": {
        "title": "报告标题",
        "author": "InsightForge",
        "created_at": "日期"
      },
      "slides": [
        {
          "type": "title|content|section|chart",
          "title": "幻灯片标题",
          "content": [...],
          "chart_suggestion": "图表建议（如有）"
        }
      ]
    }
  agent: presentation_designer
  output_file: output/ppt_structure.json