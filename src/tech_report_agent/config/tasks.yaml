# Task 配置文件 - 优化版
# 每个Task定义: description, expected_output, agent

analyze_task:
  description: >
    ## 🌐 输出语言设置
    
    {% if language == 'en' -%}
    **IMPORTANT: Write your entire output in English.**
    {% else -%}
    **重要：请使用中文撰写全部输出内容。**
    {% endif %}
    
    ---
    
    针对"{topic}"主题进行深度分析研究。
    
    ## 🔧 可用工具
    
    你拥有以下工具来获取最新信息：
    
    | 工具 | 功能 | 使用场景 |
    |------|------|---------|
    | `web_search` | Web搜索 | 获取最新行业动态、新闻、市场数据 |
    | `arxiv_search` | arXiv检索 | 获取最新学术研究成果 |
    | `arxiv_paper_detail` | 论文详情 | 深入了解特定论文 |
    | `web_fetch` | 页面抓取 | 深入阅读关键网页 |
    | `check_data_freshness` | 时效验证 | 检查数据是否过时 |
    | `format_citation` | 引用格式化 | 标准化引用格式 |
    
    **工具使用原则**：
    - ⚠️ 每个关键论点必须使用工具获取支撑数据
    - ⚠️ 优先使用近 3 个月的最新数据
    - ⚠️ 学术引用必须使用 arXiv ID 格式
    - ⚠️ 所有引用必须标注发表时间和访问日期
    
    ## 🧠 思维链引导
    
    在开始分析前，请先思考：
    1. 这个主题的核心问题是什么？
    2. 哪些分析框架最适合这个问题？
    3. 我需要哪些关键信息来支撑分析？→ **使用工具获取**
    4. 数据时效性要求是什么？→ **使用 check_data_freshness 验证**
    5. 预期的结论方向是什么？
    
    ## 执行步骤
    
    ### 1. 明确研究范围
    - 识别主题的核心问题
    - 确定分析的边界和重点
    - 列出关键研究问题
    
    ### 2. 检索分析框架
    - 从知识库中检索相关的分析框架
    - 选择最适合当前主题的框架组合
    - 理解框架的应用方法
    
    ### 3. 获取最新数据 🔍
    
    **必须使用工具获取数据**：
    
    ```
    示例流程：
    1. 使用 web_search 搜索 "[主题] 最新进展 2026"
    2. 使用 arxiv_search 搜索相关学术论文
    3. 使用 web_fetch 深入阅读关键页面
    4. 使用 check_data_freshness 验证数据时效
    ```
    
    **时效性要求**：
    - 技术趋势分析：数据不超过 6 个月
    - 市场竞争分析：数据不超过 3 个月
    - 学术研究综述：论文覆盖近 2 年
    
    ### 4. 执行深度分析
    - 运用选择的分析框架
    - 进行系统性分析推理
    - 形成关键洞察和结论
    
    **时间线思维**（研究类任务必须）：
    - 过去：技术/市场如何发展？
    - 现在：当前状态如何？核心挑战是什么？
    - 未来：趋势如何？机会在哪里？
    
    ### 5. 撰写技术报告
    - 遵循技术报告标准格式
    - 确保逻辑清晰、论证有力
    - 适当使用图表辅助说明
    - **所有引用使用 format_citation 格式化**
    
    ## 报告结构要求
    
    1. **标题和摘要**（300-500 字）
       - 清晰的报告标题
       - 执行摘要（3-5个关键发现，每个发现需有数据支撑）
    
    2. **主体分析**（每个维度 ≥800 字）
       - 分析框架说明
       - 详细分析过程
       - 关键数据和证据（每 200 字至少 1 个数据点）
       - 引用来源（标注时间和链接）
    
    3. **结论和建议**（500-800 字）
       - 核心结论总结
       - 可行性建议
    
    4. **参考资料**
       - 所有引用来源列表
       - 按类型分组（学术论文、网页、报告等）
    
    ## 引用格式规范
    
    **学术引用**：
    ```
    [张三 et al., 2026, arXiv:2603.12345]
    ```
    
    **网页引用**：
    ```
    [OpenAI 发布 GPT-5](https://...) - 访问日期: 2026-03-18
    ```
    
    **报告引用**：
    ```
    [McKinsey, AI 市场报告, 2026]
    ```
    
    ## 📝 输出示例（参考格式）
    
    ```markdown
    # [主题]技术分析报告
    
    > 报告生成时间: 2026-03-18
    > 数据时效: 2026-01-01 ~ 2026-03-18
    
    ## 执行摘要
    
    本报告针对[主题]进行深度分析，主要发现如下：
    
    1. **关键发现1**：[结论] 
       - 数据支撑：[来源](URL) - 2026-03-01
       - 🥇 一级证据
    
    2. **关键发现2**：[结论]
       - 数据支撑：[张三 et al., 2026, arXiv:2603.12345]
       - 🥇 一级证据
    
    ## 一、分析框架
    
    本次分析采用[框架名称]框架...
    
    ## 二、详细分析
    
    ### 2.1 [分析维度1]
    
    **过去**：...
    - 数据：[来源](URL) - 2025-12-01
    
    **现在**：...
    - 数据：[来源](URL) - 2026-03-15
    
    **未来趋势**：...
    
    ### 2.2 [分析维度2]
    ...
    
    ## 三、结论与建议
    
    ### 3.1 核心结论
    1. ...
    2. ...
    
    ### 3.2 建议
    - 建议1：...
    - 建议2：...
    
    ## 参考资料
    
    ### 学术论文
    1. [张三 et al., 2026, arXiv:2603.12345](https://arxiv.org/abs/2603.12345)
    
    ### 网页来源
    1. [OpenAI 官方博客](https://...) - 访问日期: 2026-03-18
    
    ### 行业报告
    1. [McKinsey, AI 市场报告, 2026]
    ```
    
    ## ✅ 质量检查点
    
    在提交报告前，请自检：
    - [ ] 是否有明确的标题和摘要？（300-500 字）
    - [ ] 分析框架是否应用得当？
    - [ ] **每个论点是否有工具获取的数据支撑？**
    - [ ] **数据是否标注了时效性？**（发布时间 + 访问日期）
    - [ ] 结论是否由分析过程逻辑推导得出？
    - [ ] 语言是否专业准确？
    - [ ] **引用格式是否标准化？**
    - [ ] **参考资料列表是否完整？**
    
  expected_output: >
    一份完整的Markdown格式技术报告，包含：
    - 标题和执行摘要（300-500 字）
    - 完整的分析过程（每个维度 ≥800 字）
    - 清晰的结论和建议（500-800 字）
    - 数据时效标注（发布时间 + 访问日期）
    - 标准化引用格式
    - 完整的参考资料列表
  agent: technical_analyst

design_task:
  description: >
    ## 🌐 输出语言设置
    
    {% if language == 'en' -%}
    **IMPORTANT: Write slide titles and content in English.**
    {% else -%}
    **重要：请使用中文撰写幻灯片标题和内容。**
    {% endif %}
    
    ---
    
    将技术报告转化为专业的PPT演示文稿结构。
    
    ## 🧠 思维链引导
    
    在开始设计前，请先思考：
    1. 报告的核心信息是什么？
    2. 目标受众是谁？他们关心什么？
    3. 如何在10-15页内讲清楚这个故事？
    4. 哪些信息需要图表可视化？
    
    ## 输入报告
    你需要将上一阶段生成的技术报告转化为PPT结构。
    
    ## 执行步骤
    
    ### 1. 分析报告结构
    - 提取报告的主要章节
    - 识别每部分的核心观点
    - 确定信息的优先级
    - **保留报告中的关键数据和引用**
    
    ### 2. 设计信息架构
    - 设计PPT整体大纲
    - 确定每页的核心信息
    - 规划信息流动顺序
    
    ### 3. 创建幻灯片结构
    - 设计每页的具体内容（不超过10-15页）
    - 每页内容精简为3-5个要点
    - 确保信息层次清晰
    - **每页必须包含来源引用**
    
    ## PPT设计原则
    
    - **简洁**：每页不超过3-5个要点
    - **聚焦**：突出核心信息
    - **视觉**：建议图表类型
    - **一致**：统一的风格和配色
    - **可信**：每页标注数据来源
    
    ## 📝 输出示例（完整JSON格式）
    
    ```json
    {
      "metadata": {
        "title": "OpenAI Sora 技术影响分析",
        "author": "InsightForge",
        "date": "2026-03-18",
        "data_freshness": "2026-01-01 ~ 2026-03-18"
      },
      "slides": [
        {
          "slide_number": 1,
          "type": "title",
          "title": "OpenAI Sora 技术影响分析",
          "content": ["AI视频生成的新纪元", "InsightForge | 2026-03-18"],
          "source": null
        },
        {
          "slide_number": 2,
          "type": "agenda",
          "title": "目录",
          "content": ["技术概述", "市场影响", "SWOT分析", "结论与建议"],
          "source": null
        },
        {
          "slide_number": 3,
          "type": "content",
          "title": "技术概述",
          "content": [
            "Sora是基于扩散模型的视频生成系统",
            "支持最长60秒的高清视频生成",
            "采用Transformer架构处理时空信息"
          ],
          "source": "[OpenAI 技术博客](https://...) - 2026-02-15"
        },
        {
          "slide_number": 4,
          "type": "chart",
          "title": "市场规模预测",
          "content": {
            "chart_type": "column",
            "title": "AI视频生成市场规模（亿美元）",
            "data": {
              "labels": ["2024", "2025", "2026", "2027"],
              "values": [12, 28, 65, 150]
            }
          },
          "source": "[McKinsey, AI市场报告, 2026]"
        },
        {
          "slide_number": 5,
          "type": "swot",
          "title": "SWOT 分析",
          "content": {
            "strengths": ["技术领先", "品牌优势"],
            "weaknesses": ["成本高昂", "内容安全风险"],
            "opportunities": ["市场需求增长", "应用场景扩展"],
            "threats": ["竞争加剧", "监管不确定性"]
          },
          "source": "基于多来源综合分析"
        },
        {
          "slide_number": 6,
          "type": "conclusion",
          "title": "结论与建议",
          "content": [
            "Sora将重塑视频内容生产方式",
            "建议关注应用场景落地机会",
            "需重视内容安全与合规问题"
          ],
          "source": null
        },
        {
          "slide_number": 7,
          "type": "end",
          "title": "谢谢",
          "content": ["InsightForge | 深度洞察，智慧决策"],
          "source": null
        }
      ]
    }
    ```
    
    ## ✅ 质量检查点
    
    在提交PPT结构前，请自检：
    - [ ] JSON格式是否正确？（可被程序解析）
    - [ ] 幻灯片数量是否在10-15页之间？
    - [ ] 每页内容是否精简（3-5个要点）？
    - [ ] 是否包含必要的幻灯片类型（标题、目录、内容、结束）？
    - [ ] 图表类型是否合理？（column/bar/line/pie）
    - [ ] 信息流是否清晰有逻辑？
    - [ ] **每页是否标注了数据来源？**
    
    ## ⚠️ 重要提示
    
    - 必须输出有效的JSON格式
    - 所有字符串必须正确转义引号
    - slide_number 必须连续递增
    - **每页数据幻灯片必须包含 source 字段**
    - type 字段必须是有效类型：
      - title: 封面页
      - agenda: 目录页
      - content: 普通内容页
      - key_findings: 关键发现页
      - methodology: 方法论页
      - analysis: 分析页
      - diagram: 图表页（需要 image 字段）
      - chart: 数据可视化页（需要 chart_data 字段）
      - swot: SWOT 分析页
      - conclusion: 结论页
      - recommendations: 建议页
      - closing: 结束页
    
  expected_output: >
    一份详细的PPT结构描述，JSON格式，包含完整的slides数组：
    {
      "metadata": {
        "title": "报告标题",
        "author": "InsightForge",
        "date": "日期",
        "data_freshness": "数据时效范围"
      },
      "slides": [
        {"slide_number": 1, "type": "title", "title": "标题页", "content": ["主标题", "副标题"], "source": null},
        {"slide_number": 2, "type": "agenda", "title": "目录", "content": ["要点1", "要点2", "要点3"], "source": null},
        ...更多幻灯片
      ]
    }
  agent: presentation_designer
  context: [analyze_task]